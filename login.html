<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MapLift</title>
  <meta name="description" content="Log in to your MapLift dashboard to manage your Google Business Profile.">
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563EB',
            'primary-hover': '#1D4ED8',
            secondary: '#6C757D',
            accent: '#E67E4B',
            'accent-hover': '#D06A38',
            bg: '#FFFFFF',
            surface: '#F8F9FA',
            text: '#212529',
          },
          fontFamily: {
            heading: ['Inter', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="login" class="font-body text-text">

  <!-- ========== NAV ========== -->
  <nav class="fixed top-0 inset-x-0 z-40 bg-white/50 backdrop-blur transition-shadow">
    <div class="max-w-6xl mx-auto flex items-center justify-between px-4 py-3">
      <a href="/" class="flex items-center">
        <img src="assets/img/logo.svg" alt="MapLift" class="h-8">
      </a>
      <div class="hidden md:flex items-center gap-8">
        <a href="/" data-nav="home" class="text-sm font-medium hover:text-primary transition-colors">Home</a>
        <a href="/pricing" data-nav="pricing" class="text-sm font-medium hover:text-primary transition-colors">Pricing</a>
        <a href="/audit" data-nav="audit" class="text-sm font-medium hover:text-primary transition-colors">Free Audit</a>
        <a href="/login" data-nav="login" class="px-4 py-2 bg-primary text-white rounded-full text-sm font-semibold hover:bg-primary-hover transition-colors">Login</a>
      </div>
      <button id="hamburger" class="md:hidden p-2" aria-label="Open menu">
        <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
  </nav>

  <!-- Mobile Nav Overlay -->
  <div id="mobile-nav" class="mobile-nav-overlay">
    <button class="close-btn absolute top-4 right-4 text-white p-2" aria-label="Close menu">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <a href="/" data-nav="home" class="text-xl font-medium">Home</a>
    <a href="/pricing" data-nav="pricing" class="text-xl font-medium">Pricing</a>
    <a href="/audit" data-nav="audit" class="text-xl font-medium">Free Audit</a>
    <a href="/login" data-nav="login" class="mt-4 px-6 py-3 bg-primary rounded-full text-white font-semibold">Login</a>
  </div>

  <!-- ========== LOGIN FORM ========== -->
  <section class="pt-28 pb-20 px-4 flex items-start justify-center">
    <div class="max-w-sm w-full">
      <div class="text-center mb-8 fade-in-up">
        <h1 class="text-3xl font-bold text-text">Welcome Back</h1>
        <p class="mt-2 text-secondary text-sm">Log in to your MapLift dashboard.</p>
      </div>

      <div class="bg-white rounded-3xl shadow-sm p-6 md:p-8 fade-in-up">
        <form id="login-form" novalidate>
          <div class="space-y-5">
            <div>
              <label for="login-email" class="block text-sm font-medium text-text mb-1">Email</label>
              <input type="email" id="login-email" name="email" required class="form-input" placeholder="you@example.com">
            </div>
            <div>
              <label for="login-password" class="block text-sm font-medium text-text mb-1">Password</label>
              <input type="password" id="login-password" name="password" required class="form-input" placeholder="Enter your password">
            </div>
            <div class="flex items-center justify-between">
              <label class="flex items-center gap-2 text-sm text-secondary">
                <input type="checkbox" name="remember" class="rounded border-gray-300 text-primary focus:ring-primary">
                Remember me
              </label>
              <a href="#" class="text-sm text-primary hover:underline">Forgot Password?</a>
            </div>
          </div>
          <button type="submit" class="mt-6 w-full px-6 py-3 bg-primary text-white rounded-full font-semibold text-lg hover:bg-primary-hover transition-colors">Log In</button>
        </form>
        <p class="mt-6 text-center text-sm text-secondary">
          Don't have an account? <a href="/audit" class="text-primary font-medium hover:underline">Get a Free Audit</a>
        </p>
      </div>
    </div>
  </section>

  <!-- ========== FOOTER ========== -->
  <footer class="bg-gray-900 text-white py-12 px-4">
    <div class="max-w-5xl mx-auto text-center">
      <img src="assets/img/logo.svg" alt="MapLift" class="h-8 mx-auto">
      <p class="mt-2 text-gray-400 text-sm">We Drill. You Close.</p>
      <div class="mt-6 flex justify-center gap-6 text-sm text-gray-400">
        <a href="/privacy" class="hover:text-white transition-colors">Privacy Policy</a>
        <a href="/terms" class="hover:text-white transition-colors">Terms of Service</a>
      </div>
      <p class="mt-6 text-gray-500 text-xs">&copy; 2026 MapLift.us. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/form.js"></script>
</body>
</html>
